<IfModule mod_ssl.c>
<VirtualHost *:443>
	ServerName vhagilab.dev.tyact.com
	DocumentRoot /var/www/vhagilab
	<Location />
		Require all denied
	</Location>
	<Location /favicon.ico>
		Require all granted
	</Location>
	ProxyRequests Off
	ProxyPreserveHost On
	<Proxy *>
		Order allow,deny
		Allow from all
	</Proxy>
	<Location /rigcqULMyg0Jsfxt/v4/>
		ProxyPass http://127.0.0.1:7860/
		ProxyPassReverse http://127.0.0.1:7860/
		Header always set Access-Control-Allow-Origin "*"
		Header always set Access-Control-Allow-Headers "Upgrade, X-Requested-With, Content-Type, Accept"
		RequestHeader set Upgrade "websocket"
		RequestHeader set Connection "upgrade"
		RequestHeader set Connection "upgrade"
		Require all granted
	</Location>
	RewriteEngine On
	RewriteRule ^(/rigcqULMyg0Jsfxt/v4)$ $1/ [L,R=301]
SSLCertificateFile /etc/letsencrypt/live/vhagilab.dev.tyact.com/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/vhagilab.dev.tyact.com/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
